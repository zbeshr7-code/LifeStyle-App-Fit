org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compile — required when project (D:) and pub cache (C:) are on different drives
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Agora SDK ships multiple AARs with the same namespace; required for AGP 9 until Agora updates artifacts.
android.uniquePackageNames=false
