# Use this file in Codemagic: Settings → Build → Configuration → codemagic.yaml
# Do NOT use the Workflow Editor "Default Workflow" (it fails scheme detection).

workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sa.lifestylefit
      vars:
        CM_FLUTTER_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.sa.lifestylefit
    scripts:
      - name: Post-clone bootstrap
        script: bash ./codemagic_post_clone.sh
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --scheme Runner \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name=$(grep "version: " pubspec.yaml | cut -d " " -f 2 | cut -d "+" -f 1) \
            --build-number=$(grep "version: " pubspec.yaml | cut -d "+" -f 2)
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
