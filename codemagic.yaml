workflows:
  ios-app-store:
    name: Lifestyle Fit App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sa.lifestylefit
      vars:
        CM_FLUTTER_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.sa.lifestylefit
    scripts:
      - name: Bootstrap Flutter iOS project
        script: |
          set -euo pipefail
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          flutter pub get
          mkdir -p ios/Runner.xcworkspace/xcshareddata/xcschemes
          if [ -f ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme ]; then
            cp ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme \
               ios/Runner.xcworkspace/xcshareddata/xcschemes/Runner.xcscheme
          fi
          echo "Shared schemes:"
          ls -la ios/Runner.xcodeproj/xcshareddata/xcschemes/
          ls -la ios/Runner.xcworkspace/xcshareddata/xcschemes/
          xcodebuild -list -workspace ios/Runner.xcworkspace
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --scheme Runner \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name=$(grep "version: " pubspec.yaml | cut -d " " -f 2 | cut -d "+" -f 1) \
            --build-number=$(grep "version: " pubspec.yaml | cut -d "+" -f 2)
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
