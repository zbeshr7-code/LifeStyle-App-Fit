# REQUIRED in Codemagic UI:
# Settings → Build → Configuration → switch to "codemagic.yaml" (not Workflow Editor)
#
# If you must stay on Workflow Editor, add this Pre-build script:
#   export PATH="$CM_BUILD_DIR/.codemagic/bin:$PATH"

workflows:
  default-workflow:
    name: Default workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sa.lifestylefit
      vars:
        PATH: $CM_BUILD_DIR/.codemagic/bin:$PATH
    scripts:
      - name: Post-clone bootstrap
        script: bash ./codemagic_post_clone.sh
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Put Flutter wrapper on PATH
        script: bash ./codemagic_install_flutter_wrapper.sh
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Flutter build ipa
        script: bash ./codemagic_build_ipa.sh
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
